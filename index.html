<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankosha Portfolio — Final Form</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script><style>
:root{--red:#ff1a1a}
*{box-sizing:border-box}
body{margin:0;background:black;color:white;font-family:'Anton',sans-serif;overflow:hidden}

/* SCENES */
.scene{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;opacity:0;pointer-events:none}
.scene.active{opacity:1;pointer-events:auto}

/* VIDEO */
.video-bg{position:fixed;inset:0;z-index:-2}
.video-bg iframe{width:100%;height:100%;filter:brightness(.5)}

/* NAV */
.navbar{position:fixed;bottom:0;width:100%;display:grid;grid-template-columns:repeat(3,1fr);background:rgba(0,0,0,.6);z-index:5}
.navbar button{background:none;border:none;color:white;padding:14px;font-size:14px}
.navbar button.active{color:var(--red)}

/* DESKTOP NAV */
@media(min-width:900px){
.navbar{top:20px;bottom:auto;background:none;display:block;text-align:center}
.navbar button{font-size:22px;margin:0 20px}
}

/* GALLERY */
.gallery{display:grid;gap:20px;width:100%;max-width:1000px}
.panel{overflow:hidden;border:2px solid var(--red)}
.panel img{width:100%;transition:.5s}
.panel:active img{transform:scale(1.1)}
@media(min-width:900px){
.gallery{grid-template-columns:repeat(3,1fr)}
.panel:hover img{transform:scale(1.2)}
}

/* ABOUT */
.about{max-width:700px;text-align:center;font-family:Arial;line-height:1.6}

/* TRANSITION */
#wipe{position:fixed;inset:0;background:var(--red);transform:translateX(-100%);z-index:10}

</style></head><body><div id="wipe"></div><div class="video-bg">
<iframe src="https://player.vimeo.com/video/1178908534?background=1&autoplay=1&loop=1&muted=1"></iframe>
</div><nav class="navbar">
<button onclick="switchScene('gallery',this)">WORKS</button>
<button onclick="switchScene('about',this)">ABOUT</button>
<button onclick="switchScene('contact',this)">CONTACT</button>
</nav><!-- GALLERY --><div id="gallery" class="scene active">
<h1>GALLERY</h1>
<div class="gallery">
<img src="https://i.ibb.co/6cNGvWsm"/>
<img src="https://i.ibb.co/67VL6JM8"/>
<img src="https://i.ibb.co/YFWJLCM0"/>
<img src="https://i.ibb.co/qL0ywLLB"/>
<img src="https://i.ibb.co/gb92PWpd"/>
<img src="https://i.ibb.co/9HP2y80G"/>
<img src="https://i.ibb.co/WNwdv88y"/>
<img src="https://i.ibb.co/hxQNT0D5"/>
<img src="https://i.ibb.co/vvgMCCt1"/>
<img src="https://i.ibb.co/8JTq6PQ"/>
</div>
</div><!-- ABOUT --><div id="about" class="scene">
<h1>ABOUT</h1>
<div class="about">
<p>Ankosha Banerjee is a digital artist specializing in cinematic, emotionally driven compositions blending storytelling, lighting, and stylized realism.</p>
</div>
</div><!-- CONTACT --><div id="contact" class="scene">
<h1>CONTACT</h1>
<a href="https://ankoartnull1.artstation.com/" target="_blank">ArtStation</a><br>
<a href="https://youtube.com/@ankoarts?si=bqk5ZWjOOD4uFEqY" target="_blank">YouTube</a>
</div><audio id="click" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
function switchScene(id,el){
 document.getElementById('click').play();
 document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
 el.classList.add('active');
 
 gsap.to('#wipe',{x:'100%',duration:.4,onComplete:()=>{
   document.getElementById(id).classList.add('active');
   gsap.set('#wipe',{x:'-100%'});
 }});
}

// intro animation
window.onload=()=>{
 gsap.from('.scene.active h1',{y:80,opacity:0,duration:1});
}
</script></body>
</html>
